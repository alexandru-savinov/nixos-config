# Trivy secret-scan allowlist for nixos-config.
#
# Trivy's secret scanner (see .github/workflows/trivy.yml) is the CANONICAL,
# CI-enforced secret boundary for this repo. All Trivy built-in rules stay
# enabled; the allow-rules below suppress known non-secrets, mirroring the
# intent of the former .gitleaks.toml allowlist so local pre-commit (shell.nix)
# and CI agree on exactly what counts as a leak.
#
# Trivy maps this file via --secret-config / TRIVY_SECRET_CONFIG.

allow-rules:
  - id: agenix-encrypted-secrets
    description: "*.age files are agenix-encrypted ciphertext, not plaintext secrets"
    path: '.*\.age$'

  - id: trivy-secret-config-self
    description: "this allowlist file itself"
    path: 'trivy-secret\.yaml$'

  - id: sd-image-bootstrap-password
    description: "SD image bootstrap password (public by design, changed on first boot)"
    regex: 'initialPassword\s*=\s*"nixos"'

  - id: sd-image-bootstrap-hashed-password
    description: "SD image bootstrap hashed password (public by design)"
    regex: 'initialHashedPassword\s*=\s*"\$6\$rounds'

  - id: nix-cache-public-keys
    description: "Nix binary cache public keys (public by design)"
    regex: '(cache\.nixos\.org-1:|cachix\.org-1:)'
